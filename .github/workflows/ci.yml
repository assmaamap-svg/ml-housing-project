name: CI - Python Quality Checks

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install black bandit ruff

      - name: Run unit tests
        run: pytest

      - name: Run Ruff lint
        run: ruff check .

      - name: Check Black formatting
        run: black --check .

      - name: Run Bandit security scan
        run: bandit -r src backend frontend