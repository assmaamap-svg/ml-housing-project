name: CI - Python Quality Checks

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Check
        run: ruff check .

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Format Tools
        run: pip install black
      - name: Check Black formatting
        run: black --check .

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install black bandit ruff
      - name: Run unit tests
        run: pytest
      - name: Check project structure
        run: pytest scripts/check_project_structure.py

  security:
    runs-on: ubuntu-latest
    needs: [lint, format, tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit security scan
        run: bandit -r src backend frontend

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, format, tests, security]
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend and Frontend Images
        run: |
          mkdir -p artifacts
          touch artifacts/model.joblib
          docker build -t housing-backend -f backend/Dockerfile .